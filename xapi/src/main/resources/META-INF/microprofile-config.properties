
# Do not check in production server config 
# Add this as assume-unchanged file in git index  
# git update-index --assume-unchanged <path-to>/microprofile-config.properties
# verify using git ls-files -v |  grep '^h'
# Microprofile server properties
server.port=8080
server.host=0.0.0.0

# Change the following to true to enable the optional MicroProfile Metrics REST.request metrics
metrics.rest-request.enabled=false

# Application properties. This is the default greeting
app.greeting=Hello


